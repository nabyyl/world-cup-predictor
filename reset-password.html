<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reset Password - World Cup 2026 Prediction League</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script
    src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"
    type="module">
  </script>
</head>

<body>
  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>
  <div class="bg-orb three"></div>

  <main class="app-shell">
    <section class="card auth-card">
      <div class="brand-row">
        <div class="logo-ball lottie-logo">
          <dotlottie-player
            src="football-logo.json"
            background="transparent"
            speed="1"
            loop
            autoplay>
          </dotlottie-player>
        </div>

        <div>
          <h1>Set New Password</h1>
          <p class="muted">Enter your new password below.</p>
        </div>
      </div>

      <form id="resetPasswordForm">
        <label>New Password</label>
        <input id="newPassword" type="password" required minlength="6" placeholder="Minimum 6 characters" />

        <label>Confirm New Password</label>
        <input id="confirmNewPassword" type="password" required minlength="6" placeholder="Re-enter password" />

        <button type="submit">Update Password</button>
      </form>

      <p id="resetPasswordMessage" class="message"></p>

      <button id="backToLoginBtn" type="button" class="ghost">
        Back to login
      </button>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 World Cup Prediction League. All rights reserved.</p>
    <p class="small">Designed & built by Nabyl.</p>
  </footer>

  <script>
    const DEFAULT_SUPABASE_URL = 'https://lpbsxggijjjanvnodgsn.supabase.co';
    const DEFAULT_SUPABASE_ANON_KEY = 'sb_publishable_RUaY8xsNZDZTjTUyq4SKWg_HbiLGxon';

    const supabaseClient = supabase.createClient(
      DEFAULT_SUPABASE_URL,
      DEFAULT_SUPABASE_ANON_KEY
    );

    const $ = (id) => document.getElementById(id);

    function setResetMessage(message, type = 'error') {
      const el = $('resetPasswordMessage');
      if (!el) return;

      el.style.color = type === 'success' ? '#86efac' : '#fb7185';
      el.textContent = message || '';
    }

    function loginUrl() {
      return window.location.href.replace(/reset-password\.html.*/, 'index.html');
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        setResetMessage('Password reset link verified. Enter your new password.', 'success');
      }
    });

    $('resetPasswordForm')?.addEventListener('submit', async (event) => {
      event.preventDefault();

      setResetMessage('', 'error');

      const newPassword = $('newPassword')?.value || '';
      const confirmNewPassword = $('confirmNewPassword')?.value || '';

      if (!newPassword || !confirmNewPassword) {
        setResetMessage('Enter and confirm your new password.', 'error');
        return;
      }

      if (newPassword.length < 6) {
        setResetMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      if (newPassword !== confirmNewPassword) {
        setResetMessage('Passwords do not match.', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        setResetMessage('Password updated successfully. Redirecting to login...', 'success');

        await supabaseClient.auth.signOut();

        setTimeout(() => {
          window.location.href = loginUrl();
        }, 1200);
      } catch (error) {
        setResetMessage(error.message, 'error');
      }
    });

    $('backToLoginBtn')?.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = loginUrl();
    });
  </script>
</body>
</html>
